---
- name: Instalar y configurar Apache en puerto 9999
  hosts: localhost
  connection: local
  become: yes
  tasks:
    - name: Actualizar repositorios e instalar Apache2
      apt:
        name: apache2
        state: present
        update_cache: yes

    - name: Cambiar el puerto por defecto a 9999 en ports.conf
      replace:
        path: /etc/apache2/ports.conf
        regexp: 'Listen 80'
        replace: 'Listen 9999'

    - name: Cambiar el puerto en el archivo de sitio por defecto
      replace:
        path: /etc/apache2/sites-available/000-default.conf
        regexp: '<VirtualHost \*:80>'
        replace: '<VirtualHost *:9999>'

    - name: Asegurar que Apache este iniciado y reiniciado con los cambios
      service:
        name: apache2
        state: restarted
        enabled: yes
